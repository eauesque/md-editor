<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MD Editor</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="app">
      <div id="tab-bar">
        <div id="tab-list"></div>
        <button id="tab-add" data-i18n-title="tab.new" title="New Tab">+</button>
        <div id="menu-area">
          <button id="menu-btn" data-i18n-title="tab.menu" title="Menu">☰</button>
          <div id="menu-dropdown" class="hidden">
            <button data-action="new" data-i18n="menu.new">New</button>
            <button data-action="open" data-i18n="menu.open">Open...</button>
            <button data-action="save" data-i18n="menu.save">Save</button>
            <button data-action="save-as" data-i18n="menu.saveAs">Save As...</button>
            <hr />
            <button data-action="shortcuts" data-i18n="menu.shortcuts">Keyboard Shortcuts (Ctrl+/)</button>
            <hr />
            <button data-action="about" data-i18n="menu.about">About</button>
            <hr />
            <div id="locale-selector" class="locale-selector"></div>
          </div>
        </div>
      </div>
      <div id="editor-container">
        <div id="pane-source" class="pane">
          <div id="source-toolbar">
            <span class="toolbar-label" data-i18n="toolbar.source">Source</span>
            <span class="toolbar-sep"></span>
            <button id="btn-new" data-i18n-title="toolbar.new" title="New (Ctrl+N)">📄</button>
            <div class="dropdown-btn-group">
              <button id="btn-open" data-i18n-title="toolbar.open" title="Open (Ctrl+O)">📂</button>
              <button id="btn-open-dropdown" class="dropdown-arrow" data-i18n-title="toolbar.recentFiles" title="Recent Files">▼</button>
              <div id="recent-files-dropdown" class="toolbar-dropdown hidden"></div>
            </div>
            <div class="dropdown-btn-group">
              <button id="btn-save" data-i18n-title="toolbar.save" title="Save (Ctrl+S)">💾</button>
              <button id="btn-save-dropdown" class="dropdown-arrow" data-i18n-title="toolbar.saveOptions" title="Save Options">▼</button>
              <div id="save-dropdown" class="toolbar-dropdown hidden">
                <button data-action="save" data-i18n="menu.save">Save</button>
                <button data-action="save-as" data-i18n="menu.saveAs">Save As...</button>
              </div>
            </div>
            <span class="toolbar-sep"></span>
            <button id="btn-cut" data-i18n-title="toolbar.cut" title="Cut (Ctrl+X)">✂</button>
            <button id="btn-copy" data-i18n-title="toolbar.copy" title="Copy (Ctrl+C)">📋</button>
            <button id="btn-paste" data-i18n-title="toolbar.paste" title="Paste (Ctrl+V)">📌</button>
            <span class="toolbar-spacer"></span>
            <button id="source-search-btn" data-i18n-title="toolbar.search" title="Find & Replace (Ctrl+F)">🔍</button>
          </div>
          <div id="source-content"></div>
        </div>
        <div id="pane-divider"></div>
        <div id="pane-wysiwyg" class="pane">
          <div id="wysiwyg-toolbar">
            <span class="toolbar-label" data-i18n="toolbar.wysiwyg">WYSIWYG</span>
            <span class="toolbar-sep"></span>
            <button data-cmd="bold" data-i18n-title="toolbar.bold" title="Bold (Ctrl+B)"><b>B</b></button>
            <button data-cmd="italic" data-i18n-title="toolbar.italic" title="Italic (Ctrl+I)"><i>I</i></button>
            <button data-cmd="strike" data-i18n-title="toolbar.strike" title="Strikethrough"><s>S</s></button>
            <button data-cmd="code" data-i18n-title="toolbar.inlineCode" title="Inline Code">&lt;/&gt;</button>
            <span class="toolbar-sep"></span>
            <button data-cmd="h1" data-i18n-title="toolbar.h1" title="Heading 1">H1</button>
            <button data-cmd="h2" data-i18n-title="toolbar.h2" title="Heading 2">H2</button>
            <button data-cmd="h3" data-i18n-title="toolbar.h3" title="Heading 3">H3</button>
            <span class="toolbar-sep"></span>
            <button data-cmd="bulletList" data-i18n-title="toolbar.bulletList" title="Bullet List">•─</button>
            <button data-cmd="orderedList" data-i18n-title="toolbar.orderedList" title="Numbered List">1.</button>
            <button data-cmd="blockquote" data-i18n-title="toolbar.blockquote" title="Blockquote">❝</button>
            <button data-cmd="codeBlock" data-i18n-title="toolbar.codeBlock" title="Code Block">▦</button>
            <button data-cmd="horizontalRule" data-i18n-title="toolbar.horizontalRule" title="Horizontal Rule">―</button>
            <span class="toolbar-sep"></span>
            <button id="btn-link" data-i18n-title="toolbar.link" title="Insert Link (Ctrl+K)">🔗</button>
            <span class="toolbar-sep"></span>
            <button id="table-insert-btn" data-i18n-title="toolbar.tableInsert" title="Insert Table">▦表</button>
            <span id="table-ops" class="table-ops hidden">
              <span class="toolbar-sep"></span>
              <button data-table="addColumnBefore" data-i18n-title="toolbar.addColumnBefore" title="Add Column Left">←|</button>
              <button data-table="addColumnAfter" data-i18n-title="toolbar.addColumnAfter" title="Add Column Right">|→</button>
              <button data-table="addRowBefore" data-i18n-title="toolbar.addRowBefore" title="Add Row Above">↑─</button>
              <button data-table="addRowAfter" data-i18n-title="toolbar.addRowAfter" title="Add Row Below">─↓</button>
              <span class="toolbar-sep"></span>
              <button data-table="deleteColumn" data-i18n-title="toolbar.deleteColumn" title="Delete Column">|✕|</button>
              <button data-table="deleteRow" data-i18n-title="toolbar.deleteRow" title="Delete Row">─✕─</button>
              <span class="toolbar-sep"></span>
              <button data-table="deleteTable" data-i18n-title="toolbar.deleteTable" title="Delete Table">🗑</button>
            </span>
            <span class="toolbar-spacer"></span>
            <button id="wysiwyg-search-btn" data-i18n-title="toolbar.search" title="Find & Replace (Ctrl+F)">🔍</button>
          </div>
          <div id="wysiwyg-content"></div>
        </div>
      </div>
      <div id="status-bar">
        <span id="status-chars">0 chars</span>
        <span id="status-lines">0 lines</span>
        <span id="status-cursor">1:1</span>
        <span id="status-file">New File</span>
      </div>
    </div>
  </body>
</html>
